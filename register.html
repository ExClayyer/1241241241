<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script>var t=localStorage.getItem('velo_theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark')</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | VeloShop</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat+Alternates:wght@300;400;500;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header id="site-header"></header>
    <main class="page-main">
        <section class="page-section">
            <div class="page-container page-container-narrow">
                <h1 class="page-title">Регистрация</h1>
                <form class="auth-form" id="registerForm">
                    <div class="form-group">
                        <label for="regName">Имя</label>
                        <input type="text" id="regName" class="form-input" placeholder="Иван" required>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" class="form-input" placeholder="ivan@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Пароль</label>
                        <input type="password" id="regPassword" class="form-input" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label for="regConfirm">Подтвердите пароль</label>
                        <input type="password" id="regConfirm" class="form-input" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="form-btn">Зарегистрироваться</button>
                    <p class="auth-link">Уже есть аккаунт? <a href="login.html">Войти</a></p>
                </form>
            </div>
        </section>
    </main>
    <footer id="site-footer"></footer>
    <script src="js/data.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
