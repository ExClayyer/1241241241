<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <script>var t = localStorage.getItem('velo_theme'); if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark')</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог | VeloShop</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/catalog.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="css/pages.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="css/responsive.css" media="print" onload="this.media='all'">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat+Alternates:wght@300;400;500;600;700&family=Orbitron:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header id="site-header"></header>
    <div class="catalog-hero">
        <div class="catalog-hero-inner">
            <span class="catalog-badge">CATALOG</span>
            <h1>Каталог велосипедов</h1>
            <p>22 модели от топовых брендов. Фильтруй и выбирай.</p>
        </div>
    </div>
    <main class="main-content">
        <div class="catalog-toolbar">
            <div class="search-box">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input type="text" id="searchInput" placeholder="Поиск по названию...">
            </div>
            <div class="sort-wrap">
                <select class="sort-dropdown" id="sortSelect">
                    <option value="">Сортировка</option>
                    <option value="price-asc">Цена ↑</option>
                    <option value="price-desc">Цена ↓</option>
                    <option value="name">Название</option>
                </select>
            </div>
        </div>
        <div class="catalog-body">
            <aside class="sidebar">
                <button class="sidebar-toggle" id="sidebarToggleBtn">
                    Фильтры <span>▼</span>
                </button>
                <div class="sidebar-content" id="sidebarContent"></div>
            </aside>
            <div class="products-area">
                <div class="products-count" id="productsCount">Найдено 22 из 22</div>
                <div class="products-grid" id="productsGrid"></div>
            </div>
        </div>
    </main>
    <footer id="site-footer"></footer>
    <script src="js/data.js"></script>
    <script src="js/layout.js"></script>
    <script src="catalog.js"></script>
</body>

</html>
