<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <script>var t = localStorage.getItem('velo_theme'); if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark')</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Горный велосипед Trek Marlin 5 | VeloShop</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="css/responsive.css" media="print" onload="this.media='all'">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat+Alternates:wght@300;400;500;600;700&family=Orbitron:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header id="site-header"></header>
    <main class="page-main">
        <section class="page-section">
            <div class="page-container">
                <a href="catalog.html" class="back-link">← В каталог</a>
                <div class="product-layout">
                    <div class="product-visual">
                        <img src="assets/bicycle/1.jpg" alt="Trek Marlin 5" class="product-img">
                    </div>
                    <div class="product-info">
                        <span class="product-type">Горные</span>
                        <h1 class="product-name">Горный велосипед Trek Marlin 5</h1>
                        <div class="product-meta">
                            <span class="badge in">В наличии</span>
                        </div>
                        <div class="product-price-big">55 000 ₽</div>
                        <div class="product-actions">
                            <button class="form-btn" id="addToCartBtn">В корзину</button>
                            <button class="form-btn form-btn-secondary" id="buyBtn">Купить сейчас</button>
                        </div>
                    </div>
                </div>
                <div class="product-desc">
                    Надёжный горный велосипед для начинающих. Алюминиевая рама, 21 скорость.
                    Отличный выбор для прогулок по пересечённой местности и городских парков.
                </div>
                <div class="product-specs">
                    <div class="spec-row"><span class="spec-label">Бренд</span><span class="spec-value">Trek</span>
                    </div>
                    <div class="spec-row"><span class="spec-label">Тип</span><span class="spec-value">Горные</span>
                    </div>
                    <div class="spec-row"><span class="spec-label">Размер рамы</span><span class="spec-value">M</span>
                    </div>
                    <div class="spec-row"><span class="spec-label">Цена</span><span class="spec-value">55 000 ₽</span>
                    </div>
                    <div class="spec-row"><span class="spec-label">Наличие</span><span class="spec-value">В
                            наличии</span></div>
                </div>
            </div>
        </section>
    </main>
    <footer id="site-footer"></footer>
    <script src="js/data.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/product.js"></script>
</body>

</html>
