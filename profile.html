<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <script>var t = localStorage.getItem('velo_theme'); if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark')</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет | VeloShop</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="css/responsive.css" media="print" onload="this.media='all'">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat+Alternates:wght@300;400;500;600;700&family=Orbitron:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header id="site-header"></header>
    <main class="page-main">
        <section class="page-section">
            <div class="page-container">
                <h1 class="page-title">Личный кабинет</h1>
                <div class="profile-grid">
                    <div class="profile-sidebar-card">
                        <div class="profile-avatar">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                        </div>
                        <h3>Иван Иванов</h3>
                        <p>ivan@example.com</p>
                        <div class="profile-nav">
                            <button class="profile-nav-item active" data-tab="orders">📋 Мои заказы</button>
                            <button class="profile-nav-item" data-tab="settings">⚙️ Настройки</button>
                        </div>
                    </div>
                    <div class="profile-content">
                        <div class="profile-tab active" id="tab-orders">
                            <h2>Мои заказы</h2>
                            <div class="order-card">
                                <div class="order-header">
                                    <span>Заказ №1234 от 15.05.2026</span>
                                    <span class="order-status order-status-delivered">Доставлен</span>
                                </div>
                                <div class="order-body">
                                    <p>Горный велосипед Trek Marlin 5 — 1 шт.</p>
                                    <p class="order-total">55 000 ₽</p>
                                </div>
                            </div>
                            <div class="order-card">
                                <div class="order-header">
                                    <span>Заказ №1235 от 20.05.2026</span>
                                    <span class="order-status order-status-processing">В обработке</span>
                                </div>
                                <div class="order-body">
                                    <p>Шоссейный велосипед Giant Contend — 1 шт.</p>
                                    <p class="order-total">82 000 ₽</p>
                                </div>
                            </div>
                        </div>
                        <div class="profile-tab" id="tab-settings" style="display: none;">
                            <h2>Настройки профиля</h2>
                            <form class="auth-form">
                                <div class="form-group">
                                    <label for="profileName">Имя</label>
                                    <input type="text" id="profileName" class="form-input" value="Иван Иванов">
                                </div>
                                <div class="form-group">
                                    <label for="profileEmail">Email</label>
                                    <input type="email" id="profileEmail" class="form-input" value="ivan@example.com">
                                </div>
                                <button type="submit" class="form-btn">Сохранить изменения</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer id="site-footer"></footer>
    <script src="js/data.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
